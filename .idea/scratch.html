<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="stylesheet" href="main.css">
    <title>Заметки</title>
</head>
<body>

<div class="app-container">
    
    <div class="tabs">
        <button class="tab-btn active" data-tab="notes">Заметки</button>
        <button class="tab-btn" data-tab="tasks">Задачи</button>
    </div>
    
    <div id="notes-pane" class="tab-pane active-pane">
        <div class="panel-header">
            <h2>Все заметки</h2>
            <button class="create-btn" id="createNoteBtn">+</button> <!-- нужна картинка с плюсиком-->
        </div>
        <div id="notesContainer" class="notes-grid">
            <!-- динамические заметки будут здесь -->
        </div>
    </div>
    
    <div id="tasks-pane" class="tab-pane">
        <div class="panel-header">
            <h2>Все задачи</h2>
            <button class="create-btn" id="createTaskBtn">+</button> <!-- нужна картинка с плюсиком-->
        </div>
        <div id="tasksContainer" class="notes-grid">
            <!-- карточки задач -->
        </div>
    </div>
</div>

<div id="editorModal" class="modal">
    <div class="modal-card">
        <h3 id="modalTitle">Создать заметку</h3>
        <input type="text" id="noteTitleInput" placeholder="Заголовок" autocomplete="off">
        <textarea id="noteBodyInput" rows="4" placeholder="Содержание"></textarea>
        <input type="text" id="noteTagsInput" placeholder="Теги через запятую" autocomplete="off">
        <label class="modal-label" for="noteColorInput">Цвет карточки</label>
        <select id="noteColorInput">
            <option value="#242424">Темная</option>
            <option value="#3b2f18">Желтая</option>
            <option value="#173528">Зеленая</option>
            <option value="#182f3b">Синяя</option>
            <option value="#3b1d2d">Розовая</option>
            <option value="#ffffff">Светлая</option>
        </select>
        <label class="pin-row">
            <input type="checkbox" id="notePinnedInput">
            Закрепить
        </label>
        <div class="modal-buttons">
            <button id="modalCancel" class="secondary">Отмена</button>
            <button id="modalSave" class="primary">Сохранить</button>
        </div>
    </div>
</div>

<script src="main.js"></script>

</body>
</html>
